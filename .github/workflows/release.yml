name: Build and Release

on:
  push:
    tags:
      - '20**-**-**'    # Matches 2026-03-16
      - '20**-**-**.*'  # Matches 2026-03-16.1, .2, etc.

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin_ext: ""
            release_name: wikiurl-linux-amd64
          - os: macos-latest # Apple Silicon (ARM64) runner
            bin_ext: ""
            release_name: wikiurl-macos-arm64
          - os: macos-13 # Intel (x86_64) runner
            bin_ext: ""
            release_name: wikiurl-macos-amd64
          - os: windows-latest
            bin_ext: ".exe"
            release_name: wikiurl-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmysqlclient-dev

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install mysql-client

      - name: Install Nimble packages
        run: nimble install -y cligen db_connector zip 

      # 1. Build the Standalone version (No MySQL dependencies)
      - name: Build Standalone binary
        run: nim c -d:ssl -d:release --outdir:. src/wikiurl.nim

      # 2. Build the SQL-enabled version
      - name: Build SQL binary
        run: nim c -d:ssl -d:release -d:useSql -o:wikiurl-sql${{ matrix.bin_ext }} src/wikiurl.nim

      # Rename the Standalone binary
      - name: Rename Standalone binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv wikiurl${{ matrix.bin_ext }} ${{ matrix.release_name }}

      - name: Rename Standalone binary (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path "wikiurl${{ matrix.bin_ext }}" -NewName "${{ matrix.release_name }}"

      # Rename the SQL binary
      - name: Rename SQL binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv wikiurl-sql${{ matrix.bin_ext }} ${{ matrix.release_name }}-sql

      - name: Rename SQL binary (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path "wikiurl-sql${{ matrix.bin_ext }}" -NewName "${{ matrix.release_name }}-sql.exe"

      # Upload all binaries to GitHub Releases
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.release_name }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
